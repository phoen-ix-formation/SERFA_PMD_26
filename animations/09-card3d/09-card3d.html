<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Carte Flip 3D</title>
    <link href="style.css" rel="stylesheet" />
</head>
<body>
    <div class="card-container">
        <div class="card">
            <!-- RECTO -->
            <div class="card-face card-front">
                <h3>Casque Audio Pro</h3>
                <p>Haute qualité sonore</p>
            </div>

            <!-- VERSO -->
            <div class="card-face card-back">
                <h3>Détails</h3>
                <ul style="text-align: left;">
                    <li>Réduction de bruit</li>
                    <li>Bluetooth 5.0</li>
                    <li>30h d'autonomie</li>
                </ul>
                <div class="price">149€</div>
                <button class="btn">Acheter</button>
            </div>
        </div>
    </div>
</body>
</html>
